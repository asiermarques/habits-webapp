version: 2.1

jobs:
  test:
    docker:
      - image: cimg/node:22.11
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-v1-{{ checksum "package-lock.json" }}
            - npm-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: npm-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Type check
          command: npm run typecheck
      - run:
          name: Unit tests
          command: npm test
      - run:
          name: Build
          command: npm run build

  e2e:
    docker:
      - image: cimg/node:22.11
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-v1-{{ checksum "package-lock.json" }}
            - npm-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: npm-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - restore_cache:
          keys:
            - playwright-v1-{{ checksum "package-lock.json" }}
            - playwright-v1-
      - run:
          name: Install Playwright browsers
          command: npm run test:e2e:install
      - save_cache:
          key: playwright-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.cache/ms-playwright
      - run:
          name: E2E tests
          command: npm run test:e2e
      - store_artifacts:
          path: playwright-report
      - store_artifacts:
          path: test-results

workflows:
  ci:
    jobs:
      - test
      - e2e:
          requires:
            - test
